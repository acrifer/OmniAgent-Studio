server:
  port: 18080

spring:
  application:
    name: devmind-studio-backend
  datasource:
    url: jdbc:h2:file:./data/devmind;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  jwt-secret: "devmind-studio-local-secret-key-please-change-in-production"
  jwt-expiration-minutes: 1440
  ai-service-base-url: http://localhost:8000
  internal-token: devmind-internal-token
  upload-dir: uploads

logging:
  level:
    org.springframework.security: INFO
