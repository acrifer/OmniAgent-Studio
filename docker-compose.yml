services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: devmind
      MYSQL_ROOT_PASSWORD: devmind-root
      MYSQL_USER: devmind
      MYSQL_PASSWORD: devmind-pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  ai-service:
    build:
      context: ./ai-service
    env_file:
      - ./ai-service/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      INTERNAL_TOKEN: devmind-internal-token
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: devmind
      SPRING_DATASOURCE_PASSWORD: devmind-pass
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      APP_AI_SERVICE_BASE_URL: http://ai-service:8000
      APP_INTERNAL_TOKEN: devmind-internal-token
    ports:
      - "18080:18080"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      - mysql
      - ai-service

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  qdrant-data:
  backend-uploads:
